<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KasirKu Pintar - POS Web</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS KHUSUS PRINT */
        @media print {
            body * { visibility: hidden; }
            #printable-receipt, #printable-receipt * { visibility: visible; }
            #printable-receipt {
                position: absolute; left: 0; top: 0;
                width: 58mm; padding: 0; margin: 0;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px; color: black;
            }
            .hide-on-print { display: none !important; }
        }
        
        /* FIX LAYAR HP/TABLET */
        html, body {
            height: 100%; height: 100dvh; margin: 0; overflow: hidden; background-color: #f3f4f6;
        }
        .active-scale:active { transform: scale(0.95); }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .no-select { user-select: none; -webkit-user-select: none; }

        /* Animasi Notifikasi (Toast) */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
    </style>
</head>
<body>

    <!-- === LAYAR LOGIN PIN === -->
    <div id="pin-overlay" class="fixed inset-0 bg-blue-700 z-[100] flex flex-col items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center transform transition-all">
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i class="fa-solid fa-lock text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-1">KasirKu</h2>
            <p class="text-gray-500 mb-8 text-sm">Masukkan PIN Keselamatan Anda</p>
            
            <form id="pin-form" onsubmit="window.checkPin(event)">
                <input type="password" id="input-pin" class="w-full text-center text-3xl tracking-[0.5em] px-4 py-4 border-2 border-gray-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none mb-6 font-mono transition-all" placeholder="••••" required autocomplete="off">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-2 text-lg">
                    Buka Mesin Daftar Tunai <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- === KONTINER UTAMA APLIKASI === -->
    <div class="fixed inset-0 flex flex-col md:flex-row hide-on-print overflow-hidden bg-gray-100 hidden" id="main-app">
        
        <!-- BAGIAN KIRI/ATAS: DAFTAR PRODUK -->
        <div class="flex-1 w-full md:w-2/3 flex flex-col p-3 md:p-4 overflow-hidden h-full relative">
            
            <!-- Indikator Loading Data -->
            <div id="loading-overlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm z-30 flex flex-col items-center justify-center rounded-2xl m-3 md:m-4">
                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-600 mb-4 shadow-sm rounded-full bg-white"></i>
                <p class="font-bold text-gray-800 text-lg">Menyambung ke Pangkalan Data...</p>
                <p class="text-sm text-gray-500 mt-1">Mengambil data dari Firebase</p>
            </div>

            <!-- Header -->
            <div class="flex-none flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-3 bg-white p-3 md:p-4 rounded-xl shadow-sm z-10">
                <h1 id="header-store-name" class="text-xl md:text-2xl font-bold text-blue-700 flex items-center gap-2 line-clamp-1">
                    <i class="fa-solid fa-store"></i> KasirKu
                </h1>
                
                <div class="flex gap-2 w-full sm:w-auto">
                    <!-- Tombol Logout -->
                    <button onclick="window.logoutPin()" class="flex items-center justify-center w-10 h-10 rounded-lg text-gray-500 bg-gray-100 hover:bg-red-100 hover:text-red-500 transition-all active-scale" title="Log Keluar">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                    <!-- Tombol Pengaturan Toko -->
                    <button onclick="window.openSettingsModal()" class="flex items-center justify-center w-10 h-10 rounded-lg text-gray-500 bg-gray-100 hover:bg-blue-100 hover:text-blue-600 transition-all active-scale" title="Tetapan Kedai">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <!-- Tombol Bluetooth -->
                    <button id="btn-bluetooth" onclick="window.connectBluetooth()" class="flex-1 sm:flex-none justify-center flex items-center gap-2 px-3 py-2 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 transition-all shadow-sm active-scale text-sm">
                        <i id="icon-bluetooth" class="fa-brands fa-bluetooth-b"></i>
                        <span id="text-bluetooth">Pencetak</span>
                    </button>
                    <!-- Tombol Tambah Menu -->
                    <button onclick="window.openModal()" class="flex-1 sm:flex-none justify-center flex items-center gap-2 px-3 py-2 rounded-lg font-medium bg-amber-500 hover:bg-amber-600 text-white transition-all shadow-sm active-scale text-sm">
                        <i class="fa-solid fa-circle-plus"></i> Menu
                    </button>
                </div>
            </div>

            <!-- Filter Kategori -->
            <div class="flex-none flex gap-2 mb-3 overflow-x-auto pb-1 no-scrollbar" id="filter-container">
                <button onclick="window.setFilter('semua')" id="filter-semua" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-800 text-white shadow-md whitespace-nowrap">Semua</button>
                <button onclick="window.setFilter('makanan')" id="filter-makanan" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200 whitespace-nowrap">Makanan</button>
                <button onclick="window.setFilter('minuman')" id="filter-minuman" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200 whitespace-nowrap">Minuman</button>
            </div>

            <!-- Area Grid Produk -->
            <div class="flex-1 overflow-y-auto pr-1 pb-2">
                <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                    <!-- Produk dirender via JavaScript -->
                </div>
            </div>
        </div>

        <!-- BAGIAN KANAN/BAWAH: KERANJANG & BAYAR -->
        <div class="w-full md:w-1/3 bg-white flex flex-col h-[45dvh] md:h-full border-t-2 md:border-t-0 md:border-l border-gray-200 shadow-[0_-5px_15px_rgba(0,0,0,0.08)] z-20">
            <div class="flex-none p-3 md:p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-base md:text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fa-solid fa-cart-shopping text-blue-600"></i> Pesanan (<span id="cart-count">0</span>)
                </h2>
                <button onclick="window.openConfirmModal()" id="btn-clear" class="hidden text-red-500 hover:text-red-700 text-xs md:text-sm font-medium flex items-center gap-1 bg-red-50 hover:bg-red-100 px-2 md:px-3 py-1.5 rounded-md transition-colors active-scale">
                    <i class="fa-solid fa-trash-can pointer-events-none"></i> Kosongkan
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-3 relative bg-white">
                <div id="empty-cart-msg" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                    <i class="fa-solid fa-cart-shopping text-4xl mb-3 opacity-20"></i>
                    <p class="text-sm">Pilih menu untuk ditambahkan</p>
                </div>
                <div id="cart-items" class="space-y-2 hidden pb-2"></div>
            </div>

            <div class="flex-none p-3 md:p-4 bg-white border-t border-gray-200">
                <div class="flex justify-between items-center mb-3 bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-100">
                    <span class="text-gray-600 font-bold text-sm md:text-base">Jumlah Harga</span>
                    <span id="total-price" class="text-xl md:text-2xl font-black text-blue-700">Rp 0</span>
                </div>
                <button id="btn-pay" onclick="window.handlePrint()" disabled class="w-full py-3 md:py-4 rounded-xl font-bold text-base md:text-lg flex justify-center items-center gap-2 transition-all shadow-none bg-gray-200 text-gray-400 cursor-not-allowed no-select">
                    <i class="fa-solid fa-print"></i> 
                    <span id="text-pay">Bayar & Cetak</span>
                </button>
            </div>
        </div>
    </div>

    <!-- === MODAL PENGATURAN TOKO === -->
    <div id="modal-settings" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                <h3 class="font-bold text-lg text-gray-800"><i class="fa-solid fa-gear text-blue-600 mr-2"></i> Tetapan Kedai</h3>
                <button onclick="window.closeSettingsModal()" class="text-gray-400 hover:text-red-500 transition-colors p-1 bg-white rounded-full">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="form-settings" onsubmit="window.saveSettings(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Kedai (Header Resit)</label>
                    <input type="text" id="input-store-name" required placeholder="Contoh: KASIRKU RESTO" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none uppercase" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Alamat Kedai / Nombor Telefon</label>
                    <textarea id="input-store-address" required rows="2" placeholder="Contoh: Jl. Sudirman No. 12" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded-xl active-scale flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Simpan Tetapan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- === MODAL TAMBAH PRODUK === -->
    <div id="modal-add" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                <h3 class="font-bold text-lg text-gray-800">Tambah Menu Baru</h3>
                <button onclick="window.closeModal()" class="text-gray-400 hover:text-red-500 transition-colors p-1 bg-white rounded-full">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="form-add" onsubmit="window.handleAddProduct(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Barangan</label>
                    <input type="text" id="input-name" required placeholder="Contoh: Ayam Geprek" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Harga (Rp)</label>
                    <input type="number" id="input-price" required min="1" placeholder="Contoh: 15000" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                    <select id="input-category" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        <option value="makanan">Makanan</option>
                        <option value="minuman">Minuman</option>
                    </select>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl active-scale">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Simpan ke Pangkalan Data
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- === MODAL KONFIRMASI KOSONGKAN === -->
    <div id="modal-confirm" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden p-6 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500"></i>
            </div>
            <h3 class="font-bold text-xl text-gray-800 mb-2">Kosongkan Pesanan?</h3>
            <p class="text-gray-500 mb-6 text-sm">Semua item akan dipadam dan tidak boleh dikembalikan.</p>
            <div class="flex gap-3">
                <button onclick="window.closeConfirmModal()" class="flex-1 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 active-scale">Batal</button>
                <button onclick="window.executeClearCart()" class="flex-1 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 active-scale">Ya, Padam</button>
            </div>
        </div>
    </div>

    <!-- === TOAST NOTIFICATION CONTAINER === -->
    <div id="toast-container" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 z-[110] flex flex-col gap-2 w-[90%] max-w-sm pointer-events-none"></div>

    <!-- === AREA CETAK BROWSER === -->
    <div id="printable-receipt" class="hidden"></div>

    <!-- === JAVASCRIPT LOGIC DENGAN FIREBASE === -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG FIREBASE ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyBPzVaOwVo7Vny6Zd1Hfuyn21neRAH5GQs",
            authDomain: "absen-fa8b4.firebaseapp.com",
            projectId: "absen-fa8b4",
            storageBucket: "absen-fa8b4.firebasestorage.app",
            messagingSenderId: "186875255423",
            appId: "1:186875255423:web:2eb5f1f22882f58e28fd4a",
            measurementId: "G-VRHBYD6505"
        };
        
        const myAppId = 'kasirku-app-github'; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;
        let products = [];
        let cart = [];
        let currentFilter = 'semua';
        let printerCharacteristic = null;
        
        // Data Kedai Default
        let storeName = 'KASIRKU PINTAR';
        let storeAddress = 'Jl. Contoh Alamat No. 123';

        // ==========================================
        // 1. SISTEM LOGIN PIN
        // ==========================================
        window.checkPin = function(e) {
            e.preventDefault();
            const pin = document.getElementById('input-pin').value;
            
            if (pin === '1234') {
                sessionStorage.setItem('isKasirLoggedIn', 'true');
                document.getElementById('pin-overlay').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                window.showToast("Berjaya log masuk!", "success");
                initAuth(); 
            } else {
                window.showToast("PIN Salah! Sila cuba lagi.", "error");
                document.getElementById('input-pin').value = '';
                const form = document.getElementById('pin-form');
                form.classList.add('translate-x-2');
                setTimeout(() => form.classList.replace('translate-x-2', '-translate-x-2'), 100);
                setTimeout(() => form.classList.replace('-translate-x-2', 'translate-x-0'), 200);
            }
        };

        window.logoutPin = function() {
            sessionStorage.removeItem('isKasirLoggedIn');
            location.reload(); 
        };

        if (sessionStorage.getItem('isKasirLoggedIn') === 'true') {
            document.getElementById('pin-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            initAuth();
        }

        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-600' : (type === 'error' ? 'bg-red-500' : 'bg-blue-600');
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-circle-xmark' : 'fa-info-circle');
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 toast-enter pointer-events-auto w-full`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-xl"></i><p class="font-medium text-sm flex-1">${message}</p>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

        // ==========================================
        // 2. KONEKSI FIREBASE (DATA MENU & KEDAI) - PUBLIC SYNC
        // ==========================================
        async function initAuth() {
            try { await signInAnonymously(auth); } 
            catch (err) { document.getElementById('loading-overlay').innerHTML = `<p class="text-red-500 font-bold">Gagal menyambung ke Pangkalan Data</p>`; }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Panggil laluan "Public/Data" supaya semua peranti melihat data yang sama!
                loadSettingsFromFirebase(); 
                loadProductsFromFirebase(); 
            }
        });

        // MUAT PENGATURAN KEDAI (Sync Semua Peranti)
        function loadSettingsFromFirebase() {
            // LALUAN DITUKAR KE RUANGAN AWAM (PUBLIC)
            const settingsRef = doc(db, 'artifacts', myAppId, 'public', 'data', 'settings', 'store_info');
            onSnapshot(settingsRef, (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    storeName = data.name || 'KASIRKU PINTAR';
                    storeAddress = data.address || 'Jl. Contoh Alamat No. 123';
                }
                
                document.getElementById('header-store-name').innerHTML = `<i class="fa-solid fa-store"></i> ${storeName}`;
                document.getElementById('input-store-name').value = storeName;
                document.getElementById('input-store-address').value = storeAddress;
            });
        }

        // MUAT MENU (Sync Semua Peranti)
        function loadProductsFromFirebase() {
            // LALUAN DITUKAR KE RUANGAN AWAM (PUBLIC)
            const productsRef = collection(db, 'artifacts', myAppId, 'public', 'data', 'products');
            onSnapshot(productsRef, (snapshot) => {
                document.getElementById('loading-overlay').style.display = 'none';

                if (snapshot.empty && products.length === 0) {
                    const initialProducts = [
                        { id: 101, name: 'Nasi Goreng Spesial', price: 25000, category: 'makanan' },
                        { id: 103, name: 'Es Teh Manis', price: 5000, category: 'minuman' }
                    ];
                    initialProducts.forEach(async (p) => { await setDoc(doc(productsRef, p.id.toString()), p); });
                } else {
                    products = [];
                    snapshot.forEach(document => { products.push(document.data()); });
                    products.sort((a, b) => a.id - b.id);
                    window.renderProducts();
                }
            });
        }

        // ==========================================
        // 3. LOGIKA UI & PENGATURAN
        // ==========================================
        window.openSettingsModal = function() { document.getElementById('modal-settings').classList.remove('hidden'); };
        window.closeSettingsModal = function() { document.getElementById('modal-settings').classList.add('hidden'); };

        window.saveSettings = async function(e) {
            e.preventDefault();
            if (!currentUser) return;

            const name = document.getElementById('input-store-name').value;
            const address = document.getElementById('input-store-address').value;
            const btnSubmit = e.target.querySelector('button[type="submit"]');
            
            const oriText = btnSubmit.innerHTML;
            btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Menyimpan...`;
            btnSubmit.disabled = true;

            try {
                // SIMPAN KE LALUAN AWAM SUPAYA PERANTI LAIN BOLEH BACA
                const docRef = doc(db, 'artifacts', myAppId, 'public', 'data', 'settings', 'store_info');
                await setDoc(docRef, { name: name.toUpperCase(), address: address }); 
                
                window.closeSettingsModal();
                window.showToast("Tetapan kedai berjaya dikemaskini!", "success");
            } catch (error) {
                window.showToast("Gagal menyimpan tetapan", "error");
            } finally {
                btnSubmit.innerHTML = oriText;
                btnSubmit.disabled = false;
            }
        };

        window.renderProducts = function() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; 
            const filteredProducts = currentFilter === 'semua' ? products : products.filter(p => p.category === currentFilter);

            filteredProducts.forEach(product => {
                const isFood = product.category === 'makanan';
                const iconClass = isFood ? 'fa-utensils' : 'fa-mug-hot';
                const colorClass = isFood ? 'bg-orange-50 text-orange-600 group-hover:bg-orange-100' : 'bg-blue-50 text-blue-600 group-hover:bg-blue-100';

                grid.innerHTML += `
                    <button onclick="window.addToCart(${product.id})" class="bg-white p-3 md:p-4 rounded-xl shadow-sm hover:shadow-md border border-gray-100 hover:border-blue-400 transition-all flex flex-col items-center text-center group active-scale no-select">
                        <div class="p-3 rounded-full mb-2 transition-colors ${colorClass}">
                            <i class="fa-solid ${iconClass} text-xl md:text-2xl"></i>
                        </div>
                        <h3 class="font-semibold text-gray-800 text-xs md:text-sm mb-1 h-8 md:h-10 line-clamp-2">${product.name}</h3>
                        <p class="text-blue-700 font-bold bg-gray-50 px-2 py-1 rounded-md w-full border border-gray-100 text-xs md:text-sm">${formatRupiah(product.price)}</p>
                    </button>
                `;
            });
        };

        window.setFilter = function(category) {
            currentFilter = category;
            ['semua', 'makanan', 'minuman'].forEach(cat => {
                const btn = document.getElementById(`filter-${cat}`);
                btn.className = cat === category 
                    ? "filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-gray-800 text-white shadow-md whitespace-nowrap"
                    : "filter-btn px-4 py-2 rounded-lg text-sm font-medium transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200 whitespace-nowrap";
            });
            window.renderProducts();
        };

        window.renderCart = function() {
            const cartItemsDiv = document.getElementById('cart-items');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const cartCount = document.getElementById('cart-count');
            const totalPriceEl = document.getElementById('total-price');
            const btnPay = document.getElementById('btn-pay');
            const btnClear = document.getElementById('btn-clear');

            let total = 0, totalItems = 0;
            cartItemsDiv.innerHTML = ''; 

            if (cart.length === 0) {
                emptyMsg.style.display = 'flex';
                cartItemsDiv.style.display = 'none';
                btnClear.style.display = 'none';
                btnPay.disabled = true;
                btnPay.className = "w-full py-3 md:py-4 rounded-xl font-bold text-base md:text-lg flex justify-center items-center gap-2 transition-all shadow-none bg-gray-200 text-gray-400 cursor-not-allowed no-select";
            } else {
                emptyMsg.style.display = 'none';
                cartItemsDiv.style.display = 'block';
                btnClear.style.display = 'flex';
                btnPay.disabled = false;
                btnPay.className = "w-full py-3 md:py-4 rounded-xl font-bold text-base md:text-lg flex justify-center items-center gap-2 transition-all shadow-md bg-green-600 text-white hover:bg-green-700 hover:shadow-lg active-scale";

                cart.forEach(item => {
                    total += (item.price * item.qty);
                    totalItems += item.qty;
                    cartItemsDiv.innerHTML += `
                        <div class="flex justify-between items-center bg-white border border-gray-100 p-2 md:p-3 rounded-xl shadow-sm">
                            <div class="flex-1 pr-2">
                                <h4 class="font-semibold text-xs md:text-sm line-clamp-1">${item.name}</h4>
                                <p class="text-blue-600 font-medium text-[10px] md:text-xs">${formatRupiah(item.price)}</p>
                            </div>
                            <div class="flex items-center gap-2 md:gap-3">
                                <div class="flex items-center bg-gray-50 rounded-lg border border-gray-200 no-select">
                                    <button onclick="window.updateQty(${item.id}, -1)" class="w-6 h-6 md:w-8 md:h-8 flex justify-center items-center hover:bg-gray-200 rounded-l-lg"><i class="fa-solid fa-minus text-[10px] md:text-xs pointer-events-none"></i></button>
                                    <span class="w-5 md:w-6 text-center font-bold text-xs md:text-sm bg-white py-1">${item.qty}</span>
                                    <button onclick="window.updateQty(${item.id}, 1)" class="w-6 h-6 md:w-8 md:h-8 flex justify-center items-center hover:bg-gray-200 rounded-r-lg"><i class="fa-solid fa-plus text-[10px] md:text-xs pointer-events-none"></i></button>
                                </div>
                                <button onclick="window.removeItem(${item.id})" class="text-red-400 hover:text-red-600 bg-red-50 p-1.5 md:p-2 rounded-lg active-scale"><i class="fa-solid fa-trash-can text-sm pointer-events-none"></i></button>
                            </div>
                        </div>`;
                });
                cartItemsDiv.parentElement.scrollTop = cartItemsDiv.parentElement.scrollHeight;
            }
            cartCount.innerText = totalItems;
            totalPriceEl.innerText = formatRupiah(total);
        };

        window.addToCart = function(id) {
            const product = products.find(p => p.id == id);
            const index = cart.findIndex(i => i.id == id);
            if (index > -1) cart[index].qty += 1;
            else if (product) cart.push({ ...product, qty: 1 });
            window.renderCart();
        };
        window.updateQty = function(id, delta) {
            const index = cart.findIndex(i => i.id == id);
            if (index > -1) {
                cart[index].qty += delta;
                if (cart[index].qty <= 0) cart.splice(index, 1);
            }
            window.renderCart();
        };
        window.removeItem = function(id) { cart = cart.filter(i => i.id != id); window.renderCart(); };
        window.openConfirmModal = function() { document.getElementById('modal-confirm').classList.remove('hidden'); };
        window.closeConfirmModal = function() { document.getElementById('modal-confirm').classList.add('hidden'); };
        window.executeClearCart = function() { cart = []; window.renderCart(); window.closeConfirmModal(); };
        window.openModal = function() { document.getElementById('modal-add').classList.remove('hidden'); };
        window.closeModal = function() { document.getElementById('modal-add').classList.add('hidden'); document.getElementById('form-add').reset(); };
        
        window.handleAddProduct = async function(e) {
            e.preventDefault(); 
            if (!currentUser) return;

            const name = document.getElementById('input-name').value;
            const price = parseInt(document.getElementById('input-price').value);
            const category = document.getElementById('input-category').value;
            
            if (name && price > 0) {
                const newProduct = { id: Date.now(), name, price, category };
                const btnSubmit = e.target.querySelector('button[type="submit"]');
                const oriText = btnSubmit.innerHTML;
                btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Menyimpan...`;
                btnSubmit.disabled = true;

                try {
                    // SIMPAN KE LALUAN AWAM
                    const docRef = doc(db, 'artifacts', myAppId, 'public', 'data', 'products', newProduct.id.toString());
                    await setDoc(docRef, newProduct);
                    window.closeModal(); 
                    window.showToast("Menu berjaya disimpan di Pangkalan Data!", "success");
                } catch (error) {
                    window.showToast("Gagal menyimpan data", "error");
                } finally {
                    btnSubmit.innerHTML = oriText;
                    btnSubmit.disabled = false;
                }
            }
        };

        // ==========================================
        // 4. PENCETAKAN RESIT DENGAN NAMA KEDAI
        // ==========================================
        window.connectBluetooth = async function() {
            if (!navigator.bluetooth) { window.showToast("Gunakan Chrome PC/Android", "error"); return; }
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '0000fee7-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                for (const s of services) {
                    for (const c of await s.getCharacteristics()) {
                        if (c.properties.write || c.properties.writeWithoutResponse) { printerCharacteristic = c; break; }
                    }
                    if (printerCharacteristic) break;
                }
                if (printerCharacteristic) {
                    document.getElementById('btn-bluetooth').className = "flex-1 sm:flex-none justify-center flex items-center gap-2 px-3 py-2 rounded-lg font-medium text-white bg-green-600 active-scale text-sm";
                    document.getElementById('icon-bluetooth').className = "fa-solid fa-link";
                    document.getElementById('text-bluetooth').innerText = "Tersambung";
                    document.getElementById('text-pay').innerText = "Cetak ke Bluetooth";
                    window.showToast("Pencetak Bluetooth Tersambung!", "success");
                } else throw new Error("Gagal mencari pencetak.");
            } catch (err) { window.showToast("Batal menyambung", "error"); }
        };

        window.handlePrint = async function() {
            if (cart.length === 0) return;
            const currentDate = new Date().toLocaleString('id-ID');
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);

            if (printerCharacteristic) {
                try {
                    let receipt = "\x1B\x40\x1B\x61\x01" + storeName.toUpperCase() + "\n" + storeAddress + "\nWaktu: " + currentDate + "\n--------------------------------\n\x1B\x61\x00";
                    
                    cart.forEach(i => {
                        let l2 = `${i.qty} x ${i.price}`, tot = `${i.qty * i.price}`;
                        receipt += `${i.name}\n${l2}${" ".repeat(Math.max(1, 32 - l2.length - tot.length))}${tot}\n`;
                    });
                    
                    let strTot = `JUMLAH: Rp ${total.toLocaleString('id-ID')}`;
                    receipt += `--------------------------------\n${" ".repeat(Math.max(0, 32 - strTot.length))}${strTot}\n\x1B\x61\x01Terima Kasih!\n\x0A\x0A\x0A`;
                    
                    const data = new TextEncoder().encode(receipt);
                    for (let i = 0; i < data.length; i += 512) await printerCharacteristic.writeValue(data.slice(i, i + 512));
                    window.showToast("Resit berjaya dicetak!", "success");
                    cart = []; window.renderCart(); return;
                } catch (e) { window.showToast("Pencetak terputus, menggunakan PDF", "error"); }
            }

            const div = document.getElementById('printable-receipt');
            let html = `
                <div style="text-align: center; margin-bottom: 10px;">
                    <h2 style="font-size: 16px; margin-bottom: 3px;">${storeName.toUpperCase()}</h2>
                    <p style="white-space: pre-wrap; margin-bottom: 5px;">${storeAddress}</p>
                    <hr>
                    <p style="text-align:left; margin-top: 5px;">Waktu: ${currentDate}</p>
                    <hr>
                </div>`;
                
            cart.forEach(i => html += `<div style="margin-bottom: 5px;"><b>${i.name}</b><div style="display:flex; justify-content:space-between;"><span>${i.qty} x ${i.price.toLocaleString('id-ID')}</span><span>${(i.qty * i.price).toLocaleString('id-ID')}</span></div></div>`);
            
            html += `<hr><div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px; margin-top:5px;"><span>JUMLAH:</span><span>Rp ${total.toLocaleString('id-ID')}</span></div><p style="text-align:center; margin-top:20px;">Terima Kasih!</p>`;
            
            div.innerHTML = html;
            window.onafterprint = () => { window.onafterprint = null; cart = []; window.renderCart(); };
            window.print();
        };
    </script>
</body>
