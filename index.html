<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KasirKu Pintar - POS Web</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS KHUSUS UNTUK PRINT STRUK --- */
        @media print {
            body * { visibility: hidden; }
            #printable-receipt, #printable-receipt * { visibility: visible; }
            #printable-receipt {
                position: absolute; left: 0; top: 0;
                width: 58mm; padding: 0; margin: 0;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px; color: black;
            }
            .hide-on-print { display: none !important; }
        }
        
        /* Efek Animasi Tombol */
        .active-scale:active { transform: scale(0.95); }
        
        /* Desain Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

        /* Mencegah teks terblok saat klik cepat */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen w-screen overflow-hidden flex flex-col">

    <!-- === ANTARMUKA UTAMA === -->
    <div class="flex flex-col md:flex-row h-full w-full hide-on-print overflow-hidden">
        
        <!-- BAGIAN KIRI/ATAS: DAFTAR PRODUK (Scrollable Sendiri) -->
        <div class="w-full md:w-2/3 flex flex-col flex-1 p-3 md:p-4 overflow-hidden">
            
            <!-- Header (Tetap di atas) -->
            <div class="flex-shrink-0 flex flex-col sm:flex-row justify-between items-start sm:items-center mb-3 gap-3 bg-white p-3 md:p-4 rounded-xl shadow-sm">
                <h1 class="text-xl md:text-2xl font-bold text-blue-700 flex items-center gap-2">
                    <i class="fa-solid fa-store"></i> KasirKu
                </h1>
                
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <!-- Tombol Koneksi Bluetooth -->
                    <button id="btn-bluetooth" onclick="connectBluetooth()" class="flex-1 sm:flex-none justify-center flex items-center gap-2 px-3 py-2 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 transition-all shadow-sm active-scale text-sm">
                        <i id="icon-bluetooth" class="fa-brands fa-bluetooth-b"></i>
                        <span id="text-bluetooth">Printer</span>
                    </button>

                    <!-- Tombol Tambah Produk -->
                    <button onclick="openModal()" class="flex-1 sm:flex-none justify-center flex items-center gap-2 px-3 py-2 rounded-lg font-medium bg-amber-500 hover:bg-amber-600 text-white transition-all shadow-sm active-scale text-sm">
                        <i class="fa-solid fa-circle-plus"></i> Tambah Menu
                    </button>
                </div>
            </div>

            <!-- Filter Kategori (Tetap di atas) -->
            <div class="flex-shrink-0 flex gap-2 mb-3 overflow-x-auto pb-1 no-scrollbar" id="filter-container">
                <button onclick="setFilter('semua')" id="filter-semua" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors bg-gray-800 text-white shadow-md whitespace-nowrap">Semua</button>
                <button onclick="setFilter('makanan')" id="filter-makanan" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200 whitespace-nowrap">Makanan</button>
                <button onclick="setFilter('minuman')" id="filter-minuman" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200 whitespace-nowrap">Minuman</button>
            </div>

            <!-- Area Tampilan Produk (Bisa Di-Scroll) -->
            <div class="flex-1 overflow-y-auto pb-2 pr-1">
                <div id="product-grid" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">
                    <!-- Produk dirender via JavaScript -->
                </div>
            </div>
        </div>

        <!-- BAGIAN KANAN/BAWAH: KERANJANG & BAYAR (Scrollable & Pinned Bottom) -->
        <!-- Di HP tingginya 45% layar (45vh), di PC tingginya penuh (h-full) -->
        <div class="w-full md:w-1/3 bg-white flex flex-col h-[45vh] md:h-full border-t-2 md:border-t-0 md:border-l border-gray-200 shadow-[0_-5px_15px_rgba(0,0,0,0.08)] md:shadow-2xl z-20">
            
            <!-- Header Keranjang (Tetap) -->
            <div class="flex-shrink-0 p-3 md:p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-base md:text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fa-solid fa-cart-shopping text-blue-600"></i> Pesanan (<span id="cart-count">0</span>)
                </h2>
                <!-- Tombol Kosongkan -->
                <button onclick="openConfirmModal()" id="btn-clear" class="hidden text-red-500 hover:text-red-700 text-xs md:text-sm font-medium flex items-center gap-1 bg-red-50 hover:bg-red-100 px-2 md:px-3 py-1.5 rounded-md transition-colors active-scale">
                    <i class="fa-solid fa-trash-can pointer-events-none"></i> Kosongkan
                </button>
            </div>

            <!-- Area Isi Keranjang (Bisa Di-Scroll) -->
            <div class="flex-1 overflow-y-auto p-3 md:p-4 relative">
                <!-- Pesan Kosong -->
                <div id="empty-cart-msg" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400">
                    <i class="fa-solid fa-cart-shopping text-4xl md:text-5xl mb-3 opacity-20"></i>
                    <p class="text-sm">Pilih menu untuk ditambahkan</p>
                </div>

                <!-- Daftar Item -->
                <div id="cart-items" class="space-y-2 hidden">
                    <!-- Item Keranjang muncul di sini -->
                </div>
            </div>

            <!-- Bagian Bawah: Total & Tombol Bayar (Selalu Terlihat di Paling Bawah Layar) -->
            <div class="flex-shrink-0 p-3 md:p-4 bg-white border-t border-gray-200">
                <div class="flex justify-between items-center mb-3 bg-gray-50 p-2 md:p-3 rounded-lg border border-gray-100">
                    <span class="text-gray-600 font-bold text-sm md:text-base">Total Harga</span>
                    <span id="total-price" class="text-xl md:text-2xl font-black text-blue-700">Rp 0</span>
                </div>
                <!-- Tombol Bayar -->
                <button id="btn-pay" onclick="handlePrint()" disabled class="w-full py-3 md:py-4 rounded-xl font-bold text-base md:text-lg flex justify-center items-center gap-2 transition-all shadow-none bg-gray-200 text-gray-400 cursor-not-allowed no-select">
                    <i class="fa-solid fa-print"></i> 
                    <span id="text-pay">Bayar & Cetak</span>
                </button>
            </div>
        </div>
    </div>

    <!-- === MODAL: TAMBAH PRODUK BARU === -->
    <div id="modal-add" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                <h3 class="font-bold text-lg text-gray-800">Tambah Menu Baru</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-colors p-1 bg-white rounded-full shadow-sm">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="form-add" onsubmit="handleAddProduct(event)" class="p-5 md:p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Barang</label>
                    <input type="text" id="input-name" required placeholder="Contoh: Ayam Geprek" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Harga (Rp)</label>
                    <input type="number" id="input-price" required min="1" placeholder="Contoh: 15000" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                    <select id="input-category" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                        <option value="makanan">Makanan</option>
                        <option value="minuman">Minuman</option>
                    </select>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active-scale">
                        Simpan Menu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- === MODAL: KONFIRMASI KOSONGKAN KERANJANG === -->
    <div id="modal-confirm" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all p-6 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500"></i>
            </div>
            <h3 class="font-bold text-xl text-gray-800 mb-2">Kosongkan Pesanan?</h3>
            <p class="text-gray-500 mb-6 text-sm">Semua item di keranjang akan dihapus dan tidak bisa dikembalikan.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors active-scale">Batal</button>
                <button onclick="executeClearCart()" class="flex-1 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-md transition-colors active-scale">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <!-- === AREA CETAK BROWSER (STRUK) === -->
    <div id="printable-receipt" class="hidden">
        <!-- Struktur HTML untuk struk -->
    </div>

    <!-- === JAVASCRIPT LOGIC === -->
    <script>
        // DATA APLIKASI
        let products = [
            { id: 1, name: 'Nasi Goreng Spesial', price: 25000, category: 'makanan' },
            { id: 2, name: 'Mie Goreng Seafood', price: 30000, category: 'makanan' },
            { id: 3, name: 'Es Teh Manis', price: 5000, category: 'minuman' },
            { id: 4, name: 'Kopi Susu Gula Aren', price: 18000, category: 'minuman' }
        ];
        
        let cart = [];
        let currentFilter = 'semua';
        let printerDevice = null;
        let printerCharacteristic = null;

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(number);
        };

        // RENDER PRODUK
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; 
            
            const filteredProducts = currentFilter === 'semua' ? products : products.filter(p => p.category === currentFilter);

            filteredProducts.forEach(product => {
                const isFood = product.category === 'makanan';
                const iconClass = isFood ? 'fa-utensils' : 'fa-mug-hot';
                const colorClass = isFood ? 'bg-orange-50 text-orange-600 group-hover:bg-orange-100' : 'bg-blue-50 text-blue-600 group-hover:bg-blue-100';

                const cardHTML = `
                    <button onclick="addToCart(${product.id})" class="bg-white p-3 md:p-4 rounded-xl shadow-sm hover:shadow-md border border-gray-100 hover:border-blue-400 transition-all flex flex-col items-center text-center group active-scale no-select">
                        <div class="p-3 rounded-full mb-2 transition-colors ${colorClass}">
                            <i class="fa-solid ${iconClass} text-xl md:text-2xl"></i>
                        </div>
                        <h3 class="font-semibold text-gray-800 text-xs md:text-sm mb-1 leading-tight h-8 md:h-10 line-clamp-2">${product.name}</h3>
                        <p class="text-blue-700 font-bold bg-gray-50 px-2 py-1 rounded-md w-full border border-gray-100 text-xs md:text-sm">${formatRupiah(product.price)}</p>
                    </button>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // FILTER
        function setFilter(category) {
            currentFilter = category;
            ['semua', 'makanan', 'minuman'].forEach(cat => {
                const btn = document.getElementById(`filter-${cat}`);
                if (cat === category) {
                    btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors bg-gray-800 text-white shadow-md whitespace-nowrap";
                } else {
                    btn.className = "filter-btn px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200 whitespace-nowrap";
                }
            });
            renderProducts();
        }

        // RENDER KERANJANG
        function renderCart() {
            const cartItemsDiv = document.getElementById('cart-items');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const cartCount = document.getElementById('cart-count');
            const totalPriceEl = document.getElementById('total-price');
            const btnPay = document.getElementById('btn-pay');
            const btnClear = document.getElementById('btn-clear');

            let total = 0;
            let totalItems = 0;
            cartItemsDiv.innerHTML = ''; 

            if (cart.length === 0) {
                emptyMsg.style.display = 'flex';
                cartItemsDiv.style.display = 'none';
                btnClear.style.display = 'none';
                
                btnPay.disabled = true;
                btnPay.className = "w-full py-3 md:py-4 rounded-xl font-bold text-base md:text-lg flex justify-center items-center gap-2 transition-all shadow-none bg-gray-200 text-gray-400 cursor-not-allowed no-select";
            } else {
                emptyMsg.style.display = 'none';
                cartItemsDiv.style.display = 'block';
                btnClear.style.display = 'flex';
                
                btnPay.disabled = false;
                btnPay.className = "w-full py-3 md:py-4 rounded-xl font-bold text-base md:text-lg flex justify-center items-center gap-2 transition-all shadow-md bg-green-600 text-white hover:bg-green-700 hover:shadow-lg active-scale";

                cart.forEach(item => {
                    total += (item.price * item.qty);
                    totalItems += item.qty;

                    const itemHTML = `
                        <div class="flex justify-between items-center bg-white border border-gray-100 p-2 md:p-3 rounded-xl shadow-sm">
                            <div class="flex-1 pr-2">
                                <h4 class="font-semibold text-xs md:text-sm line-clamp-1">${item.name}</h4>
                                <p class="text-blue-600 font-medium text-[10px] md:text-xs">${formatRupiah(item.price)}</p>
                            </div>
                            <div class="flex items-center gap-2 md:gap-3">
                                <div class="flex items-center bg-gray-50 rounded-lg border border-gray-200 no-select">
                                    <button onclick="updateQty(${item.id}, -1)" class="w-6 h-6 md:w-8 md:h-8 flex justify-center items-center hover:text-blue-600 hover:bg-gray-200 rounded-l-lg transition-colors">
                                        <i class="fa-solid fa-minus text-[10px] md:text-xs pointer-events-none"></i>
                                    </button>
                                    <span class="w-5 md:w-6 text-center font-bold text-xs md:text-sm bg-white py-1">${item.qty}</span>
                                    <button onclick="updateQty(${item.id}, 1)" class="w-6 h-6 md:w-8 md:h-8 flex justify-center items-center hover:text-blue-600 hover:bg-gray-200 rounded-r-lg transition-colors">
                                        <i class="fa-solid fa-plus text-[10px] md:text-xs pointer-events-none"></i>
                                    </button>
                                </div>
                                <button onclick="removeItem(${item.id})" class="text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 p-1.5 md:p-2 rounded-lg transition-colors active-scale">
                                    <i class="fa-solid fa-trash-can text-sm pointer-events-none"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    cartItemsDiv.innerHTML += itemHTML;
                });
                
                // Auto scroll keranjang ke paling bawah jika nambah barang
                cartItemsDiv.parentElement.scrollTop = cartItemsDiv.parentElement.scrollHeight;
            }

            cartCount.innerText = totalItems;
            totalPriceEl.innerText = formatRupiah(total);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id == productId);
            if (!product) return;
            const existingItemIndex = cart.findIndex(item => item.id == productId);
            if (existingItemIndex > -1) { cart[existingItemIndex].qty += 1; } 
            else { cart.push({ ...product, qty: 1 }); }
            renderCart();
        }

        function updateQty(productId, delta) {
            const itemIndex = cart.findIndex(item => item.id == productId);
            if (itemIndex > -1) {
                cart[itemIndex].qty += delta;
                if (cart[itemIndex].qty <= 0) { cart.splice(itemIndex, 1); }
            }
            renderCart();
        }

        function removeItem(productId) {
            cart = cart.filter(item => item.id != productId);
            renderCart();
        }

        // KOSONGKAN KERANJANG
        function openConfirmModal() { document.getElementById('modal-confirm').classList.remove('hidden'); }
        function closeConfirmModal() { document.getElementById('modal-confirm').classList.add('hidden'); }
        function executeClearCart() { cart = []; renderCart(); closeConfirmModal(); }

        // TAMBAH PRODUK
        function openModal() { document.getElementById('modal-add').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-add').classList.add('hidden'); document.getElementById('form-add').reset(); }
        function handleAddProduct(event) {
            event.preventDefault(); 
            const name = document.getElementById('input-name').value;
            const price = parseInt(document.getElementById('input-price').value);
            const category = document.getElementById('input-category').value;
            if (name && price > 0) {
                products.push({ id: Date.now(), name: name, price: price, category: category });
                closeModal(); setFilter(category);
            }
        }

        // BLUETOOTH
        async function connectBluetooth() {
            if (!navigator.bluetooth) { alert("Gunakan Chrome di Android/PC Desktop untuk fitur Bluetooth."); return; }
            const btn = document.getElementById('btn-bluetooth');
            const icon = document.getElementById('icon-bluetooth');
            const text = document.getElementById('text-bluetooth');
            const textPay = document.getElementById('text-pay');

            text.innerText = "Mencari...";
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '0000fee7-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                let characteristic = null;
                for (const service of services) {
                    const characteristics = await service.getCharacteristics();
                    for (const char of characteristics) {
                        if (char.properties.write || char.properties.writeWithoutResponse) { characteristic = char; break; }
                    }
                    if (characteristic) break;
                }

                if (characteristic) {
                    printerDevice = device; printerCharacteristic = characteristic;
                    btn.className = "flex-1 sm:flex-none justify-center flex items-center gap-2 px-3 py-2 rounded-lg font-medium text-white bg-green-600 hover:bg-green-700 transition-all shadow-sm active-scale text-sm";
                    icon.className = "fa-solid fa-link"; text.innerText = "Tersambung"; textPay.innerText = "Cetak ke Bluetooth";
                } else { throw new Error("Gagal menemukan layanan cetak."); }
            } catch (error) {
                console.error(error); text.innerText = "Printer";
            }
        }

        // CETAK STRUK
        async function handlePrint() {
            if (cart.length === 0) return;
            const currentDate = new Date().toLocaleString('id-ID');
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            if (printerCharacteristic) {
                try {
                    let receipt = "\x1B\x40\x1B\x61\x01KASIRKU PINTAR\nJl. Contoh Jalan No. 123\nWaktu: " + currentDate + "\n--------------------------------\n\x1B\x61\x00";
                    cart.forEach(item => {
                        receipt += `${item.name}\n`;
                        let line2 = `${item.qty} x ${item.price}`;
                        let totalItem = `${item.qty * item.price}`;
                        receipt += line2 + " ".repeat(Math.max(1, 32 - line2.length - totalItem.length)) + totalItem + "\n";
                    });
                    let strTotal = `TOTAL: Rp ${total.toLocaleString('id-ID')}`;
                    receipt += "--------------------------------\n" + " ".repeat(Math.max(0, 32 - strTotal.length)) + strTotal + "\n\x1B\x61\x01Terima Kasih!\n\x0A\x0A\x0A";
                    
                    const data = new TextEncoder().encode(receipt);
                    for (let i = 0; i < data.length; i += 512) { await printerCharacteristic.writeValue(data.slice(i, i + 512)); }
                    cart = []; renderCart(); return;
                } catch (error) {
                    // Fallback
                }
            }

            const receiptDiv = document.getElementById('printable-receipt');
            let receiptHTML = `<div style="text-align: center; margin-bottom: 10px;"><h2 style="margin: 0 0 5px 0; font-size: 16px;">KASIRKU PINTAR</h2><p style="margin: 0; font-size: 10px;">Jl. Contoh Jalan No. 123</p><div style="border-bottom: 1px dashed #000; margin: 10px 0;"></div><p style="margin: 0; font-size: 10px; text-align: left;">Waktu: ${currentDate}</p><div style="border-bottom: 1px dashed #000; margin: 10px 0;"></div></div><div style="margin-bottom: 10px;">`;
            cart.forEach(item => {
                receiptHTML += `<div style="margin-bottom: 5px;"><div style="font-size: 12px; font-weight: bold;">${item.name}</div><div style="display: flex; justify-content: space-between; font-size: 12px;"><span>${item.qty} x ${item.price.toLocaleString('id-ID')}</span><span>${(item.qty * item.price).toLocaleString('id-ID')}</span></div></div>`;
            });
            receiptHTML += `</div><div style="border-top: 1px dashed #000; padding-top: 5px; margin-bottom: 10px;"><div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;"><span>TOTAL:</span><span>Rp ${total.toLocaleString('id-ID')}</span></div></div><div style="text-align: center; margin-top: 20px; font-size: 10px;"><p style="margin: 0;">Terima Kasih Atas Kunjungan Anda!</p></div>`;
            
            receiptDiv.innerHTML = receiptHTML;
            window.onafterprint = function() { window.onafterprint = null; cart = []; renderCart(); };
            window.print();
        }

        window.onload = () => { renderProducts(); renderCart(); };
    </script>
</body>
</html>
