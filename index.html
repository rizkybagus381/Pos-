<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KasirKu Pintar - POS Web</title>
    <!-- Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS KHUSUS UNTUK PRINT STRUK --- */
        @media print {
            body * {
                visibility: hidden;
            }
            #printable-receipt, #printable-receipt * {
                visibility: visible;
            }
            #printable-receipt {
                position: absolute;
                left: 0;
                top: 0;
                width: 58mm; /* Ukuran standar printer kasir thermal */
                padding: 0;
                margin: 0;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px;
                color: black;
            }
            .hide-on-print {
                display: none !important;
            }
        }
        
        /* Efek Animasi Tombol */
        .active-scale:active {
            transform: scale(0.95);
        }
        
        /* Desain Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        /* Mencegah highlight teks saat klik cepat */
        .no-select { user-select: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 h-screen overflow-hidden">

    <!-- === ANTARMUKA UTAMA === -->
    <div class="flex flex-col md:flex-row h-full hide-on-print">
        
        <!-- BAGIAN KIRI: DAFTAR PRODUK & TOMBOL ATAS -->
        <div class="w-full md:w-2/3 p-4 flex flex-col h-full">
            <!-- Header -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4 bg-white p-4 rounded-xl shadow-sm">
                <h1 class="text-2xl font-bold text-blue-700 flex items-center gap-2">
                    <i class="fa-solid fa-store"></i> KasirKu
                </h1>
                
                <div class="flex flex-wrap gap-2">
                    <!-- Tombol Koneksi Bluetooth -->
                    <button id="btn-bluetooth" onclick="connectBluetooth()" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-white bg-blue-600 hover:bg-blue-700 transition-all shadow-sm active-scale">
                        <i id="icon-bluetooth" class="fa-brands fa-bluetooth-b"></i>
                        <span id="text-bluetooth">Koneksi Printer</span>
                    </button>

                    <!-- Tombol Tambah Produk -->
                    <button onclick="openModal()" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium bg-amber-500 hover:bg-amber-600 text-white transition-all shadow-sm active-scale">
                        <i class="fa-solid fa-circle-plus"></i> Tambah Menu
                    </button>
                </div>
            </div>

            <!-- Filter Kategori -->
            <div class="flex gap-2 mb-4" id="filter-container">
                <button onclick="setFilter('semua')" id="filter-semua" class="filter-btn px-4 py-2 rounded-lg font-medium capitalize transition-colors bg-gray-800 text-white shadow-md">Semua</button>
                <button onclick="setFilter('makanan')" id="filter-makanan" class="filter-btn px-4 py-2 rounded-lg font-medium capitalize transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200">Makanan</button>
                <button onclick="setFilter('minuman')" id="filter-minuman" class="filter-btn px-4 py-2 rounded-lg font-medium capitalize transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200">Minuman</button>
            </div>

            <!-- Area Tampilan Produk (Scrollable) -->
            <div class="flex-1 overflow-y-auto pr-2 pb-6">
                <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- Produk akan dirender di sini via JavaScript -->
                </div>
            </div>
        </div>

        <!-- BAGIAN KANAN: KERANJANG PESANAN -->
        <div class="w-full md:w-1/3 bg-white border-l border-gray-200 flex flex-col h-full shadow-2xl z-10">
            <!-- Header Keranjang -->
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-lg font-bold flex items-center gap-2 text-gray-800">
                    <i class="fa-solid fa-cart-shopping text-blue-600"></i> Pesanan (<span id="cart-count">0</span>)
                </h2>
                <button onclick="clearCart()" id="btn-clear" class="hidden text-red-500 hover:text-red-700 text-sm font-medium flex items-center gap-1 bg-red-50 px-2 py-1 rounded-md transition-colors">
                    <i class="fa-solid fa-trash-can"></i> Kosongkan
                </button>
            </div>

            <!-- Daftar Item Keranjang (Scrollable) -->
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Status Keranjang Kosong -->
                <div id="empty-cart-msg" class="h-full flex flex-col items-center justify-center text-gray-400">
                    <i class="fa-solid fa-cart-shopping text-6xl mb-4 opacity-20"></i>
                    <p>Pilih menu untuk ditambahkan</p>
                </div>
                <!-- Item Keranjang muncul di sini -->
            </div>

            <!-- Bagian Bawah: Total & Tombol Bayar -->
            <div class="p-4 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between items-center mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <span class="text-gray-600 font-bold">Total Harga</span>
                    <span id="total-price" class="text-2xl font-black text-blue-700">Rp 0</span>
                </div>
                <button id="btn-pay" onclick="handlePrint()" disabled class="w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 transition-all shadow-none bg-gray-200 text-gray-400 cursor-not-allowed no-select">
                    <i class="fa-solid fa-print"></i> 
                    <span id="text-pay">Bayar & Cetak</span>
                </button>
            </div>
        </div>
    </div>

    <!-- === MODAL: TAMBAH PRODUK BARU === -->
    <div id="modal-add" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="flex justify-between items-center p-4 border-b border-gray-100 bg-gray-50">
                <h3 class="font-bold text-lg text-gray-800">Tambah Menu Baru</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition-colors p-1 bg-white rounded-full shadow-sm">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="form-add" onsubmit="handleAddProduct(event)" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Barang</label>
                    <input type="text" id="input-name" required placeholder="Contoh: Ayam Geprek" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Harga (Rp)</label>
                    <input type="number" id="input-price" required min="1" placeholder="Contoh: 15000" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" />
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                    <select id="input-category" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-white">
                        <option value="makanan">Makanan</option>
                        <option value="minuman">Minuman</option>
                    </select>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active-scale">
                        Simpan Menu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- === AREA CETAK BROWSER (STRUK) === -->
    <div id="printable-receipt" class="hidden">
        <!-- Struktur HTML untuk struk akan dibuat otomatis oleh JavaScript -->
    </div>

    <!-- === JAVASCRIPT LOGIC === -->
    <script>
        // 1. DATA APLIKASI
        let products = [
            { id: 1, name: 'Nasi Goreng Spesial', price: 25000, category: 'makanan' },
            { id: 2, name: 'Mie Goreng Seafood', price: 30000, category: 'makanan' },
            { id: 3, name: 'Es Teh Manis', price: 5000, category: 'minuman' },
            { id: 4, name: 'Kopi Susu Gula Aren', price: 18000, category: 'minuman' }
        ];
        
        let cart = [];
        let currentFilter = 'semua';
        
        // Status Bluetooth
        let printerDevice = null;
        let printerCharacteristic = null;

        // Utilitas Format Mata Uang (Rupiah)
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency', currency: 'IDR', minimumFractionDigits: 0
            }).format(number);
        };

        // 2. FUNGSI MENAMPILKAN DAFTAR PRODUK
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; // Bersihkan grid
            
            // Saring berdasarkan kategori
            const filteredProducts = currentFilter === 'semua' 
                ? products 
                : products.filter(p => p.category === currentFilter);

            filteredProducts.forEach(product => {
                const isFood = product.category === 'makanan';
                const iconClass = isFood ? 'fa-utensils' : 'fa-mug-hot';
                const colorClass = isFood ? 'bg-orange-50 text-orange-600 group-hover:bg-orange-100' : 'bg-blue-50 text-blue-600 group-hover:bg-blue-100';

                // Buat Elemen Tombol Produk
                const cardHTML = `
                    <button onclick="addToCart(${product.id})" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md border border-gray-100 hover:border-blue-400 transition-all flex flex-col items-center text-center group active-scale no-select">
                        <div class="p-3 rounded-full mb-3 transition-colors ${colorClass}">
                            <i class="fa-solid ${iconClass} text-2xl"></i>
                        </div>
                        <h3 class="font-semibold text-gray-800 text-sm mb-1 leading-tight h-10 line-clamp-2">${product.name}</h3>
                        <p class="text-gray-800 font-bold bg-gray-50 px-2 py-1 rounded-md w-full border border-gray-100">${formatRupiah(product.price)}</p>
                    </button>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // 3. FUNGSI FILTER KATEGORI
        function setFilter(category) {
            currentFilter = category;
            
            // Reset gaya semua tombol filter
            ['semua', 'makanan', 'minuman'].forEach(cat => {
                const btn = document.getElementById(`filter-${cat}`);
                if (cat === category) {
                    btn.className = "filter-btn px-4 py-2 rounded-lg font-medium capitalize transition-colors bg-gray-800 text-white shadow-md";
                } else {
                    btn.className = "filter-btn px-4 py-2 rounded-lg font-medium capitalize transition-colors bg-white text-gray-600 hover:bg-gray-200 border border-gray-200";
                }
            });
            
            renderProducts();
        }

        // 4. FUNGSI MENGELOLA KERANJANG PESANAN
        function renderCart() {
            const cartItemsDiv = document.getElementById('cart-items');
            const emptyMsg = document.getElementById('empty-cart-msg');
            const cartCount = document.getElementById('cart-count');
            const totalPriceEl = document.getElementById('total-price');
            const btnPay = document.getElementById('btn-pay');
            const btnClear = document.getElementById('btn-clear');

            let total = 0;
            let totalItems = 0;
            
            cartItemsDiv.innerHTML = ''; // Bersihkan daftar sebelumnya

            if (cart.length === 0) {
                // Tampilan jika keranjang kosong
                cartItemsDiv.appendChild(emptyMsg);
                emptyMsg.style.display = 'flex';
                btnClear.style.display = 'none';
                
                btnPay.disabled = true;
                btnPay.className = "w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 transition-all shadow-none bg-gray-200 text-gray-400 cursor-not-allowed";
            } else {
                // Tampilan jika ada isi keranjang
                emptyMsg.style.display = 'none';
                btnClear.style.display = 'flex';
                
                btnPay.disabled = false;
                btnPay.className = "w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 transition-all shadow-md bg-green-600 text-white hover:bg-green-700 hover:shadow-lg active-scale";

                cart.forEach(item => {
                    total += (item.price * item.qty);
                    totalItems += item.qty;

                    // Desain Item Keranjang beserta Tombol Hapus (Trash)
                    const itemHTML = `
                        <div class="flex justify-between items-center bg-white border border-gray-100 p-3 rounded-xl shadow-sm">
                            <div class="flex-1 pr-2">
                                <h4 class="font-semibold text-sm line-clamp-1">${item.name}</h4>
                                <p class="text-blue-600 font-medium text-xs">${formatRupiah(item.price)}</p>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="flex items-center bg-gray-50 rounded-lg border border-gray-200 no-select">
                                    <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 flex justify-center items-center hover:text-blue-600 hover:bg-gray-200 rounded-l-lg transition-colors">
                                        <i class="fa-solid fa-minus text-xs"></i>
                                    </button>
                                    <span class="w-6 text-center font-bold text-sm bg-white py-1">${item.qty}</span>
                                    <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 flex justify-center items-center hover:text-blue-600 hover:bg-gray-200 rounded-r-lg transition-colors">
                                        <i class="fa-solid fa-plus text-xs"></i>
                                    </button>
                                </div>
                                <button onclick="removeItem(${item.id})" class="text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    `;
                    cartItemsDiv.innerHTML += itemHTML;
                });
            }

            // Update Angka Total
            cartCount.innerText = totalItems;
            totalPriceEl.innerText = formatRupiah(total);
        }

        // Tambah Produk ke Keranjang
        function addToCart(productId) {
            // Gunakan '==' agar aman jika terjadi perbedaan format String/Number
            const product = products.find(p => p.id == productId);
            if (!product) return;

            const existingItemIndex = cart.findIndex(item => item.id == productId);
            if (existingItemIndex > -1) {
                cart[existingItemIndex].qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        // Kurangi / Tambah Jumlah Item
        function updateQty(productId, delta) {
            const itemIndex = cart.findIndex(item => item.id == productId);
            if (itemIndex > -1) {
                cart[itemIndex].qty += delta;
                if (cart[itemIndex].qty <= 0) {
                    cart.splice(itemIndex, 1); // Hapus jika jumlah jadi 0
                }
            }
            renderCart();
        }

        // Hapus Langsung 1 Jenis Produk (Tombol Tong Sampah)
        function removeItem(productId) {
            cart = cart.filter(item => item.id != productId);
            renderCart();
        }

        // Kosongkan Semua Keranjang
        function clearCart() {
            if(confirm('Apakah Anda yakin ingin mengosongkan semua pesanan?')) {
                cart = [];
                renderCart();
            }
        }

        // 5. FUNGSI MODAL TAMBAH PRODUK
        function openModal() {
            document.getElementById('modal-add').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal-add').classList.add('hidden');
            document.getElementById('form-add').reset();
        }

        // Simpan Produk Baru
        function handleAddProduct(event) {
            event.preventDefault(); // Mencegah reload halaman
            const name = document.getElementById('input-name').value;
            const price = parseInt(document.getElementById('input-price').value);
            const category = document.getElementById('input-category').value;

            if (name && price > 0) {
                const newProduct = {
                    id: Date.now(), // Generate ID Unik dari Waktu
                    name: name,
                    price: price,
                    category: category
                };
                products.push(newProduct);
                closeModal();
                setFilter(category); // Pindahkan filter ke kategori yang baru ditambah
                alert("Menu baru berhasil ditambahkan!");
            }
        }

        // 6. FUNGSI BLUETOOTH PRINTER
        async function connectBluetooth() {
            if (!navigator.bluetooth) {
                alert("Browser ini tidak mendukung Web Bluetooth. Gunakan Google Chrome di Android/PC Desktop.");
                return;
            }

            const btn = document.getElementById('btn-bluetooth');
            const icon = document.getElementById('icon-bluetooth');
            const text = document.getElementById('text-bluetooth');
            const textPay = document.getElementById('text-pay');

            text.innerText = "Mencari...";
            
            try {
                // Mencari perangkat Bluetooth di sekitar
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [
                        '000018f0-0000-1000-8000-00805f9b34fb', // Standard BLE POS
                        'e7810a71-73ae-499d-8c15-faa9aef0c3f2', // Printer China 58mm
                        '0000fee7-0000-1000-8000-00805f9b34fb'  // Alternatif lain
                    ]
                });

                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                let characteristic = null;

                // Mencari layanan (service) yang bisa menerima print/write
                for (const service of services) {
                    const characteristics = await service.getCharacteristics();
                    for (const char of characteristics) {
                        if (char.properties.write || char.properties.writeWithoutResponse) {
                            characteristic = char;
                            break;
                        }
                    }
                    if (characteristic) break;
                }

                if (characteristic) {
                    printerDevice = device;
                    printerCharacteristic = characteristic;
                    
                    // Update Tampilan Tombol jadi Hijau
                    btn.className = "flex items-center gap-2 px-4 py-2 rounded-lg font-medium text-white bg-green-600 hover:bg-green-700 transition-all shadow-sm active-scale";
                    icon.className = "fa-solid fa-link";
                    text.innerText = "Printer Aktif";
                    textPay.innerText = "Cetak ke Bluetooth";
                    
                    alert("Printer Bluetooth Berhasil Tersambung!");
                } else {
                    throw new Error("Gagal menemukan layanan cetak pada perangkat ini.");
                }
            } catch (error) {
                console.error(error);
                alert("Koneksi gagal/dibatalkan: " + error.message);
                text.innerText = "Koneksi Printer";
            }
        }

        // 7. FUNGSI CETAK STRUK & PEMBAYARAN
        async function handlePrint() {
            if (cart.length === 0) return;

            const currentDate = new Date().toLocaleString('id-ID');
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            // JIKA BLUETOOTH TERSAMBUNG -> Cetak Langsung Tanpa Dialog
            if (printerCharacteristic) {
                try {
                    let receipt = "";
                    
                    // ESC/POS Commands (Perintah Bahasa Mesin Printer)
                    receipt += "\x1B\x40"; // Initialize
                    receipt += "\x1B\x61\x01"; // Align Center
                    receipt += "KASIRKU PINTAR\n";
                    receipt += "Jl. Contoh Jalan No. 123\n";
                    receipt += `Waktu: ${currentDate}\n`;
                    receipt += "--------------------------------\n";
                    
                    receipt += "\x1B\x61\x00"; // Align Left
                    cart.forEach(item => {
                        receipt += `${item.name}\n`;
                        let line2 = `${item.qty} x ${item.price}`;
                        let totalItem = `${item.qty * item.price}`;
                        let spaces = 32 - line2.length - totalItem.length;
                        receipt += line2 + " ".repeat(Math.max(1, spaces)) + totalItem + "\n";
                    });
                    
                    receipt += "--------------------------------\n";
                    
                    let strTotal = `TOTAL: Rp ${total.toLocaleString('id-ID')}`;
                    receipt += " ".repeat(Math.max(0, 32 - strTotal.length)) + strTotal + "\n";
                    
                    receipt += "\x1B\x61\x01"; // Align Center
                    receipt += "Terima Kasih!\n";
                    receipt += "\x0A\x0A\x0A"; // Feed 3 lines biar struk keluar

                    const encoder = new TextEncoder();
                    const data = encoder.encode(receipt);
                    
                    // Kirim data ke printer sedikit-sedikit (Limit Bluetooth MTU)
                    for (let i = 0; i < data.length; i += 512) {
                        await printerCharacteristic.writeValue(data.slice(i, i + 512));
                    }
                    
                    // Kosongkan keranjang jika sukses print Bluetooth
                    cart = [];
                    renderCart();
                    alert("Pembayaran Berhasil. Struk telah dicetak!");
                    return; // Proses Selesai
                    
                } catch (error) {
                    console.error("Gagal print bluetooth:", error);
                    alert("Koneksi Bluetooth terputus. Sistem akan menggunakan mode Cetak Browser.");
                }
            }

            // JIKA TIDAK ADA BLUETOOTH -> Gunakan Fitur Print PDF Bawaan Browser
            const receiptDiv = document.getElementById('printable-receipt');
            
            // Generate HTML Struk
            let receiptHTML = `
                <div style="text-align: center; margin-bottom: 10px;">
                    <h2 style="margin: 0 0 5px 0; font-size: 16px;">KASIRKU PINTAR</h2>
                    <p style="margin: 0; font-size: 10px;">Jl. Contoh Jalan No. 123</p>
                    <div style="border-bottom: 1px dashed #000; margin: 10px 0;"></div>
                    <p style="margin: 0; font-size: 10px; text-align: left;">Waktu: ${currentDate}</p>
                    <div style="border-bottom: 1px dashed #000; margin: 10px 0;"></div>
                </div>
                <div style="margin-bottom: 10px;">
            `;

            cart.forEach(item => {
                receiptHTML += `
                    <div style="margin-bottom: 5px;">
                        <div style="font-size: 12px; font-weight: bold;">${item.name}</div>
                        <div style="display: flex; justify-content: space-between; font-size: 12px;">
                            <span>${item.qty} x ${item.price.toLocaleString('id-ID')}</span>
                            <span>${(item.qty * item.price).toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                `;
            });

            receiptHTML += `
                </div>
                <div style="border-top: 1px dashed #000; padding-top: 5px; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                        <span>TOTAL:</span>
                        <span>Rp ${total.toLocaleString('id-ID')}</span>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 20px; font-size: 10px;">
                    <p style="margin: 0;">Terima Kasih Atas Kunjungan Anda!</p>
                </div>
            `;

            // Pasang HTML Struk ke div yang akan dicetak
            receiptDiv.innerHTML = receiptHTML;

            // Atur Event: Apa yang terjadi SETELAH jendela print ditutup?
            window.onafterprint = function() {
                // Hapus event listener agar tidak bentrok di print berikutnya
                window.onafterprint = null; 
                // Otomatis kosongkan keranjang karena dianggap sudah dibayar
                if(cart.length > 0) {
                    cart = [];
                    renderCart();
                }
            };

            // Panggil Jendela Print
            window.print();
        }

        // 8. JALANKAN SAAT HALAMAN PERTAMA KALI DIBUKA
        window.onload = () => {
            renderProducts();
            renderCart();
        };

    </script>
</body>
</html>
